<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" sizes="512x512" href="../../assets/Images/Logo NewKet V2.jpeg">
    <link rel="icon" type="image/png" href="../../assets/Images/Logo NewKet V2.jpeg">
    <meta name="theme-color" content="#111827">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NewKet">
    <title>Mes Clients | NewKet</title>
    <link rel="stylesheet" href="../../assets/css/input.css">
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="../../services/app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/responsive.css">
    <link rel="stylesheet" href="../../assets/css/admin.css">
</head>

<body class="text-gray-900">
    <div id="adminNavbarPlaceholder"></div>

    <div class="max-w-[1800px] mx-auto px-4 sm:px-8 pt-32 pb-12 flex flex-col md:flex-row gap-6">        <div id="adminSidebarPlaceholder"></div>

        <!-- Main Content -->
        <main class="flex-1 min-w-0 space-y-8">
            <div>
                <h1 class="text-3xl font-black tracking-tight text-gray-900" id="pageTitle">Mes Clients</h1>
                <p class="text-gray-500" id="pageSubtitle">Gérez votre base de clients fidèles.</p>
            </div>

            <div class="glass-panel overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="min-w-[800px] w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 border-b border-gray-100">
                                <th class="whitespace-nowrap p-4 text-[10px] font-black uppercase tracking-widest text-gray-400">Client
                                </th>
                                <th class="whitespace-nowrap p-4 text-[10px] font-black uppercase tracking-widest text-gray-400">Achats
                                </th>
                                <th class="whitespace-nowrap p-4 text-[10px] font-black uppercase tracking-widest text-gray-400">Total
                                    Dépensé</th>
                                <th class="whitespace-nowrap p-4 text-[10px] font-black uppercase tracking-widest text-gray-400 text-right">
                                    Dernière activité</th>
                            </tr>
                        </thead>
                        <tbody id="clientsBody" class="divide-y divide-gray-50">
                            <!-- Clients loaded via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="../../services/admin-layout.js"></script>
    <script>
        function renderAdminClients() {
            const tbody = document.getElementById('clientsBody');
            const stats = OrderManager.getStats();
            const orders = OrderManager.getOrders();

            // Get all known users to check roles
            const allUsers = window.UserManager ? UserManager.getUsers() : [];
            const userRoleMap = {};
            allUsers.forEach(u => { if (u.email) userRoleMap[u.email] = u.role; });

            // Unique clients from orders — only role 'customer', exclude admin & supplier
            const clientMap = new Map();
            orders.forEach(o => {
                if (o.customer && o.customer.email) {
                    const email = o.customer.email;
                    const role = userRoleMap[email];
                    // Exclude admins and suppliers
                    if (role === 'admin' || role === 'supplier') return;
                    if (!clientMap.has(email)) {
                        clientMap.set(email, {
                            name: o.customer.name,
                            email: email,
                            orders: 0,
                            total: 0,
                            lastDate: o.date
                        });
                    }
                    const c = clientMap.get(email);
                    c.orders++;
                    c.total += o.total;
                    if (new Date(o.date) > new Date(c.lastDate)) c.lastDate = o.date;
                }
            });

            const clients = Array.from(clientMap.values());

            if (clients.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="p-12 text-center text-gray-400">Aucun client répertorié.</td></tr>`;
                return;
            }

            tbody.innerHTML = clients.map(c => `
                <tr onclick="window.open('user-details.html?email=' + encodeURIComponent('${c.email}'), '_blank')" class="group hover:bg-gray-50/50 cursor-pointer transition-colors">
                    <td class="p-4">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-xs font-black text-gray-400">
                                ${c.name.substring(0, 2).toUpperCase()}
                            </div>
                            <div>
                                <div class="font-bold text-gray-900">${c.name}</div>
                                <div class="text-[10px] text-gray-400 font-medium">${c.email}</div>
                            </div>
                        </div>
                    </td>
                    <td class="p-4 font-bold text-gray-900">${c.orders} commande(s)</td>
                    <td class="p-4 font-black text-gray-900" data-price-cdf="${c.total}">${CurrencyManager.formatPrice(c.total)}</td>
                    <td class="p-4 text-right text-xs text-gray-500">${new Date(c.lastDate).toLocaleDateString()}</td>
                </tr>
            `).join('');

            if (window.CurrencyManager) CurrencyManager.updateAllPrices();
        }

        function initializeClients() {
            renderAdminClients();

            // Dynamic Labels based on role
            const role = localStorage.getItem('newketRole');
            if (role === 'admin') {
                const pageTitle = document.getElementById('pageTitle');
                const pageSubtitle = document.getElementById('pageSubtitle');
                if (pageTitle) pageTitle.textContent = 'Clients Plateforme';
                if (pageSubtitle) pageSubtitle.textContent = 'Gérez la base de données globale des clients.';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (window.newketInitialized) {
                initializeClients();
            } else {
                window.addEventListener('newketInitialized', initializeClients);
            }
        });
    </script>
</body>

</html>
