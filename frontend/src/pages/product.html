<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="../manifest.json">
    <link rel="apple-touch-icon" sizes="512x512" href="../assets/Images/Logo NewKet V2.jpeg">
    <link rel="icon" type="image/png" href="../assets/Images/Logo NewKet V2.jpeg">
    <meta name="theme-color" content="#111827">
    <title>Produit — NewKet</title>
    <script type="module" src="../services/app.js"></script>
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.82); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.4); }
        .hero-gradient { background: linear-gradient(135deg, #000000 0%, #1a1a1a 50%, #333333 100%); }
    </style>
</head>

<body class="bg-gray-50 text-gray-900 antialiased">

    <div id="header-placeholder"></div>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 py-4 md:py-6" id="main-content">
        
        <!-- Breadcrumbs -->
        <nav class="flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-8 overflow-x-auto whitespace-nowrap pb-2 sm:pb-0" id="breadcrumbs">
            <a href="../index.html" class="hover:text-gray-900 transition-colors">Accueil</a>
            <iconify-icon icon="solar:alt-arrow-right-linear" width="10"></iconify-icon>
            <a href="catalog.html" class="hover:text-gray-900 transition-colors">Catalogue</a>
            <iconify-icon icon="solar:alt-arrow-right-linear" width="10"></iconify-icon>
            <span class="text-gray-900" id="breadcrumb-current">Produit</span>
        </nav>

        <div id="productGrid">
            <!-- Image Section -->
            <div id="productImageCol">
                <div class="aspect-square glass-card rounded-3xl overflow-hidden group relative flex items-center justify-center p-6 hover:shadow-2xl transition-all duration-700">
                    <img id="mainImage" src="" alt="" class="w-full h-full object-contain mix-blend-multiply group-hover:scale-110 transition-transform duration-1000 ease-out cursor-zoom-in" onclick="openZoom()">
                </div>
                <!-- Thumbnails -->
                <div class="grid grid-cols-4 gap-4" id="thumbnailGrid"></div>
            </div>

            <!-- Details Section -->
            <div id="productDetailsCol">
                <div class="space-y-6">
                    <div>
                        <div class="flex items-center justify-between gap-4 mb-2">
                            <div id="productCategory" class="text-[10px] font-bold text-gray-500 uppercase tracking-widest font-mono">Catégorie</div>
                            <button onclick="shareProduct()" class="w-10 h-10 rounded-xl bg-gray-50 flex items-center justify-center text-gray-400 hover:text-gray-900 transition-all border border-gray-100 shadow-sm hover:shadow-md">
                                <iconify-icon icon="solar:share-linear" width="20"></iconify-icon>
                            </button>
                        </div>
                        <h1 id="productName" class="text-2xl sm:text-3xl font-black text-gray-900 tracking-tight leading-[1.1] mb-4">Chargement...</h1>
                        
                        <div id="headerRating" class="flex items-center gap-4 mb-8 invisible">
                            <div class="flex gap-0.5 text-amber-400" id="headerStars"></div>
                            <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest" id="headerReviewCount">...</span>
                        </div>

                        <div class="flex items-baseline gap-4 mb-8">
                            <span id="productPrice" class="text-2xl font-black text-gray-900">... FC</span>
                        </div>

                        <p id="productDescription" class="text-sm leading-relaxed text-gray-500 font-medium mb-10 max-w-md">...</p>
                    </div>

                    <!-- Actions -->
                    <div class="space-y-4">
                        <div class="flex items-center gap-4 bg-white p-2 rounded-2xl border border-gray-100 shadow-sm w-fit">
                            <button onclick="updateQty(-1)" class="w-12 h-12 rounded-xl flex items-center justify-center hover:bg-gray-50 transition-colors text-gray-400 hover:text-gray-900">
                                <iconify-icon icon="solar:minus-linear" width="20"></iconify-icon>
                            </button>
                            <input type="number" id="qty-input" value="1" min="1" class="w-12 text-center font-bold text-gray-900 bg-transparent border-none outline-none [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none">
                            <button onclick="updateQty(1)" class="w-12 h-12 rounded-xl flex items-center justify-center hover:bg-gray-50 transition-colors text-gray-400 hover:text-gray-900">
                                <iconify-icon icon="solar:add-linear" width="20"></iconify-icon>
                            </button>
                        </div>

                        <div class="flex gap-3">
                            <button id="mainAddToCartBtn" class="flex-1 bg-gray-900 hover:bg-black text-white py-3 sm:py-4 rounded-2xl font-bold text-sm uppercase tracking-widest transition-all hover:-translate-y-1 active:translate-y-0 shadow-lg shadow-gray-900/20 flex items-center justify-center gap-3">
                                <span>Ajouter au panier</span>
                                <iconify-icon icon="solar:cart-large-minimalistic-bold" width="20"></iconify-icon>
                            </button>
                            <button id="mainWishlistBtn" class="w-12 h-12 flex items-center justify-center rounded-2xl border-2 border-gray-100 text-gray-300 hover:text-red-500 hover:border-red-50 transition-all">
                                <iconify-icon icon="solar:heart-bold" width="28"></iconify-icon>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Reviews Section -->
        <div class="mt-32 pt-20 border-t border-gray-100">
            <div class="flex items-center justify-between mb-16">
                <div>
                    <h2 class="text-3xl font-black text-gray-900 uppercase tracking-tighter">Avis Clients</h2>
                    <p class="text-xs font-bold text-gray-400 mt-2 uppercase tracking-widest" id="reviewCountText">0 avis vérifiés</p>
                </div>
            </div>

            <div id="reviewsList" class="space-y-12">
                <!-- Reviews injected by JS -->
            </div>

            <!-- Review Form -->
            <div id="reviewFormContainer" class="mt-20"></div>
        </div>

        <!-- Recommended Products -->
        <section class="mt-32 pb-20 border-t border-gray-100 pt-20">
            <div class="flex items-center justify-between mb-12">
                <h2 class="text-3xl font-bold tracking-tight text-gray-900">Articles similaires</h2>
                <a href="catalog.html" class="text-sm font-bold text-gray-900 hover:underline flex items-center gap-2">
                    Voir tout <iconify-icon icon="solar:arrow-right-linear" width="18"></iconify-icon>
                </a>
            </div>
            <div id="recommendedGrid" class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-4 gap-6">
                <!-- Data from JS -->
            </div>
        </section>
    </main>

    <div id="mobile-nav-placeholder"></div>
    <div id="footer-placeholder"></div>

    <!-- Modals -->
    <div id="zoomModal" class="fixed inset-0 z-[100] invisible opacity-0 transition-all duration-500 bg-black/95 flex items-center justify-center p-4 backdrop-blur-2xl" onclick="closeZoom()">
        <button class="absolute top-8 right-8 text-white/50 hover:text-white transition-all">
            <iconify-icon icon="solar:close-circle-bold" width="40"></iconify-icon>
        </button>
        <img id="zoomModalImg" src="" class="max-w-full max-h-[90vh] object-contain select-none" alt="Zoom">
    </div>

    <!-- Sticky Mobile Bar -->
    <div id="stickyBar" class="fixed bottom-[72px] left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-gray-100 p-4 translate-y-full transition-all duration-500 z-[40] sm:hidden shadow-2xl">
        <div class="flex items-center gap-4">
            <img id="stickyImg" src="" class="w-12 h-12 object-contain bg-gray-50 rounded-xl" alt="">
            <div class="flex-1 min-w-0">
                <div id="stickyName" class="text-[10px] font-black text-gray-900 truncate uppercase tracking-widest">...</div>
                <div id="stickyPrice" class="text-sm font-black text-gray-900">...</div>
            </div>
            <button onclick="addToCartFromSticky()" class="bg-gray-900 text-white px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest">Ajouter</button>
        </div>
    </div>

    <script>
        const productId = new URLSearchParams(window.location.search).get('id');
        let currentRating = 5;

        async function initPage() {
            if (!productId) {
                window.location.href = 'catalog.html';
                return;
            }

            const p = await ProductManager.fetchProductById(productId);
            if (!p) {
                document.getElementById('main-content').innerHTML = `
                    <div class="py-32 text-center">
                        <iconify-icon icon="solar:ghost-broken" width="80" class="text-gray-200 mb-8"></iconify-icon>
                        <h1 class="text-4xl font-black text-gray-900 mb-4 tracking-tighter uppercase">Article Introuvable</h1>
                        <p class="text-gray-400 mb-10 max-w-sm mx-auto font-bold uppercase tracking-widest text-[10px]">Cet article n'existe plus ou le lien est incorrect.</p>
                        <a href="catalog.html" class="inline-flex items-center gap-2 bg-gray-900 text-white px-8 py-4 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-black transition-all">Retour au catalogue</a>
                    </div>
                `;
                return;
            }

            renderProductDetails(p);
            loadReviews(p.id);
            renderRecommended(p.category);
            setupListeners(p);
            initRecentlyViewed(p);
        }

        function renderProductDetails(p) {
            document.getElementById('productName').textContent = p.name;
            document.getElementById('breadcrumb-current').textContent = p.name;
            document.getElementById('productCategory').textContent = p.category;
            document.getElementById('productDescription').textContent = p.description || "Aucune description disponible pour cet article d'exception.";
            document.getElementById('stickyName').textContent = p.name;

            const priceStr = window.CurrencyManager ? CurrencyManager.formatPrice(p.price) : p.price + ' FC';
            document.getElementById('productPrice').textContent = priceStr;
            document.getElementById('stickyPrice').textContent = priceStr;

            const images = (p.image || '').split(',');
            document.getElementById('mainImage').src = images[0].trim();
            document.getElementById('stickyImg').src = images[0].trim();

            const thumbs = document.getElementById('thumbnailGrid');
            thumbs.innerHTML = images.map((img, i) => `
                <div class="aspect-square bg-white rounded-2xl overflow-hidden cursor-pointer border-2 ${i === 0 ? 'border-gray-900' : 'border-transparent'} hover:border-gray-200 transition-all p-2 glass-card" onclick="window.changeImage('${img.trim()}', this)">
                    <img src="${img.trim()}" class="w-full h-full object-contain mix-blend-multiply" onerror="this.src='../assets/Images/default.png'">
                </div>
            `).join('');

            // Wishlist state
            const isFav = FavoritesManager.isInFavorites(p.id);
            const favBtn = document.getElementById('mainWishlistBtn');
            favBtn.classList.toggle('text-red-500', isFav);
            favBtn.classList.toggle('border-red-50', isFav);
            favBtn.classList.toggle('bg-red-50/50', isFav);
        }

        function setupListeners(p) {
            document.getElementById('mainAddToCartBtn').onclick = () => {
                const qty = parseInt(document.getElementById('qty-input').value) || 1;
                CartManager.addItem(p, qty);
                if (window.showToast) showToast(`Ajouté au panier : ${p.name}`, 'success');
            };

            document.getElementById('mainWishlistBtn').onclick = () => {
                if (FavoritesManager.isInFavorites(p.id)) {
                    FavoritesManager.removeItem(p.id);
                } else {
                    FavoritesManager.addItem(p);
                }
                renderProductDetails(p); // Re-render to update heart color
            };

            window.addEventListener('scroll', () => {
                const btn = document.getElementById('mainAddToCartBtn');
                const bar = document.getElementById('stickyBar');
                if (btn && bar) {
                    const rect = btn.getBoundingClientRect();
                    if (rect.bottom < 0 && window.innerWidth < 640) bar.classList.remove('translate-y-full');
                    else bar.classList.add('translate-y-full');
                }
            });
        }

        async function loadReviews(pid) {
            try {
                const reviews = await SupabaseAdapter.fetchWithFilters('product_reviews', {
                    eq: [['product_id', pid]],
                    order: ['created_at', { ascending: false }]
                });
                const list = document.getElementById('reviewsList');
                const countText = document.getElementById('reviewCountText');
                
                if (!reviews || reviews.length === 0) {
                    list.innerHTML = `<div class="text-center py-24 bg-gray-50/50 rounded-[3rem] border-2 border-dashed border-gray-100">
                        <iconify-icon icon="solar:chat-line-broken" width="48" class="text-gray-200 mb-4"></iconify-icon>
                        <div class="text-gray-400 font-black uppercase tracking-widest text-[10px]">Soyez le premier à donner votre avis d'exception</div>
                    </div>`;
                    countText.textContent = "0 avis vérifiés";
                    renderReviewForm(pid);
                    return;
                }

                // Update average rating in header if possible
                const avg = reviews.reduce((acc, r) => acc + r.rating, 0) / reviews.length;
                const roundedAvg = Math.round(avg);
                const starsHTML = Array(5).fill(0).map((_, i) => `<iconify-icon icon="solar:star-bold" width="14" class="${i < roundedAvg ? '' : 'opacity-20'}"></iconify-icon>`).join('');
                
                // Header Rating Update
                const hr = document.getElementById('headerRating');
                if (hr) {
                    hr.classList.remove('invisible');
                    document.getElementById('headerStars').innerHTML = starsHTML;
                    document.getElementById('headerReviewCount').textContent = `${reviews.length} avis client${reviews.length > 1 ? 's' : ''}`;
                }

                countText.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="flex gap-0.5 text-amber-400">${starsHTML}</div>
                        <span class="text-gray-400 font-black uppercase tracking-widest text-[10px]">${reviews.length} avis vérifié${reviews.length > 1 ? 's' : ''}</span>
                    </div>
                `;

                list.innerHTML = reviews.map(r => {
                    const date = r.created_at ? new Date(r.created_at).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' }) : 'Récemment';
                    return `
                        <div class="glass-card p-10 rounded-[2.5rem] border border-gray-100 shadow-sm hover:shadow-xl transition-all duration-500 group">
                            <div class="flex items-start justify-between mb-8">
                                <div class="flex items-center gap-4">
                                    <div class="w-12 h-12 bg-gray-900 text-white rounded-2xl flex items-center justify-center font-black text-xl uppercase tracking-tighter">
                                        ${r.user_name ? r.user_name.charAt(0) : '?'}
                                    </div>
                                    <div>
                                        <div class="font-black text-gray-900 uppercase tracking-tighter text-sm mb-1">${r.user_name || 'Anonyme'}</div>
                                        <div class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">${date}</div>
                                    </div>
                                </div>
                                <div class="flex gap-0.5 text-amber-400 bg-amber-50 px-3 py-1.5 rounded-full scale-90 group-hover:scale-100 transition-transform">
                                    ${Array(5).fill(0).map((_, i) => `<iconify-icon icon="solar:star-bold" width="14" class="${i < r.rating ? '' : 'opacity-20'}"></iconify-icon>`).join('')}
                                </div>
                            </div>
                            <p class="text-base text-gray-600 font-medium leading-relaxed italic border-l-4 border-gray-100 pl-6 capitalize-first">${r.comment}</p>
                        </div>
                    `;
                }).join('');

                renderReviewForm(pid);
            } catch (e) {
                console.error('[Product] Reviews error:', e);
            }
        }

        function renderReviewForm(pid) {
            const cont = document.getElementById('reviewFormContainer');
            const user = AuthManager.user;

            if (!user) {
                cont.innerHTML = `
                    <div class="bg-gray-50 rounded-[3rem] p-16 text-center border border-gray-100">
                        <div class="max-w-md mx-auto space-y-8">
                            <div class="w-20 h-20 bg-white rounded-[2rem] shadow-xl flex items-center justify-center mx-auto text-gray-900 border border-gray-100">
                                <iconify-icon icon="solar:user-bold" width="32"></iconify-icon>
                            </div>
                            <div class="space-y-4">
                                <h3 class="text-2xl font-black text-gray-900 uppercase tracking-tighter">Votre avis compte</h3>
                                <p class="text-sm text-gray-500 font-medium leading-relaxed">Connectez-vous pour partager votre expérience avec cet article d'exception et aider la communauté NewKet.</p>
                            </div>
                            <a href="login.html" class="inline-flex bg-gray-900 text-white px-10 py-5 rounded-2xl font-black uppercase tracking-widest text-[10px] hover:bg-black transition-all hover:-translate-y-1 active:translate-y-0 shadow-lg shadow-gray-900/10">
                                Se connecter maintenant
                            </a>
                        </div>
                    </div>
                `;
                return;
            }

            cont.innerHTML = `
                <div class="hero-gradient rounded-[3rem] p-10 sm:p-16 text-white overflow-hidden relative shadow-2xl border border-white/10 group">
                    <div class="relative z-10 space-y-12">
                        <div class="flex items-center gap-6">
                            <div class="w-16 h-16 bg-white/10 backdrop-blur-xl rounded-2xl flex items-center justify-center border border-white/20">
                                <iconify-icon icon="solar:pen-new-square-bold" width="32"></iconify-icon>
                            </div>
                            <div>
                                <h3 class="text-3xl font-black uppercase tracking-tighter">Votre avis d'exception</h3>
                                <p class="text-[10px] font-bold text-white/40 uppercase tracking-widest mt-1">Partagez votre expérience NewKet</p>
                            </div>
                        </div>

                        <div class="grid lg:grid-cols-2 gap-16">
                            <div class="space-y-6">
                                <span class="text-[10px] font-black text-white/40 uppercase tracking-widest">Note de l'article</span>
                                <div class="flex gap-3" id="starSelector">
                                    ${[1, 2, 3, 4, 5].map(i => `
                                        <iconify-icon 
                                            icon="solar:star-bold" 
                                            width="32" 
                                            class="cursor-pointer transition-all ${i <= currentRating ? 'text-amber-400' : 'text-white/20 hover:text-white/40'}" 
                                            onclick="window.setRating(${i})"
                                            style="transform: ${i <= currentRating ? 'scale(1.15)' : 'scale(1)'}"
                                        ></iconify-icon>
                                    `).join('')}
                                </div>
                                <p class="text-[9px] font-bold text-white/50 uppercase leading-relaxed max-w-xs">Votre avis aide d'autres passionnés à découvrir des pièces uniques sur NewKet.</p>
                            </div>
                            <div class="space-y-6">
                                <div class="relative group/field">
                                    <textarea id="reviewText" placeholder="Confiez-nous votre avis sur cette pièce..." class="w-full bg-white/5 border border-white/10 rounded-3xl p-8 text-sm outline-none focus:bg-white/10 focus:ring-4 focus:ring-white/5 transition-all min-h-[160px] text-white placeholder:text-white/20"></textarea>
                                </div>
                                <button 
                                    onclick="window.submitReview('${pid}')" 
                                    id="reviewSubmitBtn" 
                                    class="w-full bg-white text-gray-900 font-black py-6 rounded-2xl hover:bg-gray-50 hover:-translate-y-1 active:scale-[0.98] transition-all uppercase tracking-widest text-[10px] shadow-xl shadow-black/20"
                                >
                                    Publier mon avis
                                </button>
                            </div>
                        </div>
                    </div>
                    <!-- Decorative element -->
                    <iconify-icon icon="solar:quote-bold" width="300" class="absolute -bottom-24 -right-24 text-white/5 transition-transform duration-1000 group-hover:scale-110 group-hover:-rotate-12 pointer-events-none"></iconify-icon>
                </div>
            `;
        }

        function renderRecommended(category) {
            const grid = document.getElementById('recommendedGrid');
            if (!grid || !window.ProductManager) return;
            const recs = ProductManager.getProducts().filter(p => p.id !== productId && p.category === category).slice(0, 4);
            grid.innerHTML = (recs.length > 0 ? recs : ProductManager.getProducts().filter(p => p.id !== productId).slice(0, 4))
                .map(p => window.buildProductCardHTML(p)).join('');
        }

        // Global functions
        window.updateQty = (val) => {
            const inp = document.getElementById('qty-input');
            inp.value = Math.max(1, (parseInt(inp.value) || 1) + val);
        };

        window.changeImage = (url, el) => {
            document.getElementById('mainImage').src = url;
            document.querySelectorAll('#thumbnailGrid > div').forEach(d => d.classList.remove('border-gray-900'));
            el.classList.add('border-gray-900');
        };

        window.openZoom = () => {
            document.getElementById('zoomModalImg').src = document.getElementById('mainImage').src;
            const modal = document.getElementById('zoomModal');
            modal.classList.remove('invisible', 'opacity-0');
            document.body.style.overflow = 'hidden';
        };

        window.closeZoom = () => {
            const modal = document.getElementById('zoomModal');
            modal.classList.add('invisible', 'opacity-0');
            document.body.style.overflow = '';
        };

        window.setRating = (v) => {
            currentRating = v;
            const stars = document.querySelectorAll('#starSelector iconify-icon');
            stars.forEach((s, i) => {
                const active = i < v;
                s.classList.toggle('text-amber-400', active);
                s.classList.toggle('text-white/20', !active);
                s.style.transform = active ? 'scale(1.15)' : 'scale(1)';
            });
        };

        window.submitReview = async (pid) => {
            const txt = document.getElementById('reviewText').value.trim();
            if (!txt) return showToast('Veuillez écrire un commentaire', 'warning');
            
            const btn = document.getElementById('reviewSubmitBtn');
            btn.disabled = true; 
            btn.innerHTML = '<iconify-icon icon="line-md:loading-twotone-loop" class="mr-2"></iconify-icon> Publication...';
            
            try {
                const user = AuthManager.user;
                if (!user) { window.location.href = 'login.html'; return; }
                
                // Safe name extraction
                const userName = user.user_metadata?.name || 
                                user.user_metadata?.full_name || 
                                (user.email ? user.email.split('@')[0] : 'Utilisateur NewKet');

                const success = await SupabaseAdapter.insert('product_reviews', {
                    product_id: pid,
                    user_id: user.id,
                    user_name: userName,
                    rating: currentRating,
                    comment: txt
                });

                if (!success) throw new Error('Insertion failed in database');

                showToast('Votre avis d\'exception a été publié !', 'success');
                document.getElementById('reviewText').value = '';
                // Refresh list using the same PID
                await loadReviews(pid);
            } catch (e) {
                console.error("[Product] Review Submission Error:", e);
                showToast('Erreur lors de l\'envoi. Veuillez réessayer.', 'error');
            } finally {
                btn.disabled = false; 
                btn.textContent = 'Publier mon avis';
            }
        };

        window.shareProduct = () => {
            const url = window.location.href;
            if (navigator.share) {
                navigator.share({ title: document.title, url: url });
            } else {
                navigator.clipboard.writeText(url);
                showToast('Lien copié dans le presse-papier !', 'info');
            }
        };

        function initRecentlyViewed(p) {
            let list = JSON.parse(localStorage.getItem('newketRecentlyViewed') || '[]');
            list = [p, ...list.filter(item => item.id !== p.id)].slice(0, 10);
            localStorage.setItem('newketRecentlyViewed', JSON.stringify(list));
        }

        window.addToCartFromSticky = () => {
            const p = ProductManager.getProduct(productId);
            if (p) {
                const q = parseInt(document.getElementById('qty-input').value) || 1;
                CartManager.addItem(p, q);
                showToast('Ajouté au panier !', 'success');
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            if (window.newketInitialized) initPage();
            else window.addEventListener('newketInitialized', initPage);
        });
    </script>
</body>
</html>
